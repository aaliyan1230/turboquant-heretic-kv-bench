<svg width="1080" height="760" viewBox="0 0 1080 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Qwen2.5 3B Kaggle T4 tradeoff snapshot</title>
  <desc id="desc">Stored notebook snapshot showing flat refusal rate and rising fidelity drift and latency under stronger TurboQuant-style KV cache compression.</desc>
  <rect width="1080" height="760" fill="#F6F1E8"/>
  <rect x="28" y="28" width="1024" height="704" rx="24" fill="#FFFDF8" stroke="#D6CFC2"/>
  <text x="64" y="88" fill="#1F2937" font-family="IBM Plex Sans, Segoe UI, sans-serif" font-size="32" font-weight="700">Qwen2.5-3B Kaggle T4 Snapshot</text>
  <text x="64" y="122" fill="#475569" font-family="IBM Plex Sans, Segoe UI, sans-serif" font-size="18">The benchmark goal is met: refusal stays flat while fidelity drift rises with stronger KV cache compression.</text>
  <rect x="64" y="148" width="952" height="74" rx="18" fill="#F2F7F5" stroke="#D6E4DE"/>
  <text x="92" y="192" fill="#0F172A" font-family="IBM Plex Sans, Segoe UI, sans-serif" font-size="18" font-weight="700">Refusal rate is unchanged at 25% across all four runs.</text>
  <text x="92" y="216" fill="#475569" font-family="IBM Plex Sans, Segoe UI, sans-serif" font-size="15">The visible signal is fidelity degradation, not a safety-behavior shift. The current Python cache path is also slower than baseline.</text>


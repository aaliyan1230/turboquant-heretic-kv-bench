  <text x="64" y="668" fill="#1F2937" font-family="IBM Plex Sans, Segoe UI, sans-serif" font-size="18" font-weight="700">Supporting checks from the same notebook</text>
  <text x="64" y="698" fill="#475569" font-family="IBM Plex Sans, Segoe UI, sans-serif" font-size="15">K/V norm asymmetry was strongly supported in a separate cached forward pass: median key-to-value norm ratio was 175.86x.</text>
  <text x="64" y="720" fill="#475569" font-family="IBM Plex Sans, Segoe UI, sans-serif" font-size="15">Needle retrieval stayed exact through the stored 1561-token probe, so the repo supports the main tradeoff claim more strongly than a clean retrieval-failure boundary.</text>
